version: "3.8"

services:
  soul-upload:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soul-upload
    ports:
      - "${PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - SOUL_UPLOAD_DATA_DIR=/data
    volumes:
      - soul-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  soul-data:
